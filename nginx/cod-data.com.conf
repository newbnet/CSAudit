# Example for a Linux host running nginx directly on the same machine as Node.
#
# If you use Nginx Proxy Manager (or another reverse proxy in Docker on a different host),
# configure the UI instead: forward cod-data.com → http://<app-host>:5010 (HTTPS in NPM).
# There is no `nginx` binary on the proxy VM — reload/restart via Docker / NPM, not `systemctl`.
#
# Production COD-DATA serves the built SPA + /api from ONE Node process on port 5010
# (not Vite 3010).

server {
    listen 80;
    server_name cod-data.com www.cod-data.com;

    location / {
        proxy_pass http://127.0.0.1:5010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
