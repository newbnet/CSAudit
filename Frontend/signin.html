<!DOCTYPE html>
<html lang="en" class="min-h-screen">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to COD-DATA – Cybersecurity Oversight & Defense">
    <title>Sign in – COD-DATA</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { font-family: "Inter", sans-serif; }
        .cod-heading { font-family: "JetBrains Mono", monospace; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">
    <header class="p-4 pt-8 border-b border-slate-700/50">
        <div class="w-full max-w-5xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between w-full items-start md:items-center gap-4">
                <a class="cod-heading font-bold text-xl text-emerald-400" href="index.html">COD-DATA <span class="text-slate-500">///</span></a>
                <nav class="flex items-center gap-8 text-sm text-slate-300">
                    <a href="about.html" class="hover:text-emerald-400 transition-colors">About</a>
                    <a href="blog.html" class="hover:text-emerald-400 transition-colors">Blog</a>
                    <a class="flex items-center bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 gap-2 p-2 px-6 rounded-md hover:bg-emerald-500/30 transition-colors" href="signin.html">
                        <i class="bi bi-shield-lock"></i>
                        <span>Sign in</span>
                    </a>
                </nav>
            </div>
        </div>
    </header>
    <section class="px-4 py-24">
        <div class="w-full max-w-5xl mx-auto flex flex-col gap-8 max-w-[400px]">
            <div>
                <h1 class="cod-heading font-bold text-2xl text-slate-100">Sign in to COD-DATA</h1>
                <span class="text-slate-500 text-sm">Enter your credentials to access the audit portal.</span>
            </div>
            <form action="" class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300" for="email">Email</label>
                    <input type="email" id="email" class="p-3 border border-slate-600 rounded-md bg-slate-800 text-slate-100 focus:border-emerald-500 focus:outline-none" placeholder="you@company.com">
                </div>
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between gap-4 items-center">
                        <label class="text-sm font-semibold text-slate-300" for="password">Password</label>
                        <a href="#" class="text-xs text-emerald-400 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" class="p-3 border border-slate-600 rounded-md bg-slate-800 text-slate-100 focus:border-emerald-500 focus:outline-none" placeholder="••••••••">
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex gap-2 items-center">
                        <input id="rememberme" name="rememberme" type="checkbox" class="rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500">
                        <label for="rememberme" class="text-sm text-slate-400">Remember me</label>
                    </div>
                    <input type="submit" value="Sign in" class="bg-emerald-500 text-slate-900 p-3 cursor-pointer rounded-md font-semibold hover:bg-emerald-400 transition-colors">
                </div>
            </form>
            <div class="flex gap-2 items-center text-sm text-slate-500">
                <span>Don't have an account?</span>
                <a href="#" class="text-emerald-400 hover:underline">Contact us</a>
            </div>
        </div>
    </section>
    <footer class="p-4 pb-8 border-t border-slate-700/50">
        <div class="w-full max-w-5xl mx-auto">
            <div class="flex gap-4 justify-between items-center">
                <small class="text-slate-500">© 2025 COD-DATA · cod-data.com</small>
                <div class="flex items-center gap-4">
                    <a href="#" class="text-slate-500 hover:text-emerald-400"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="text-slate-500 hover:text-emerald-400"><i class="bi bi-github"></i></a>
                    <a href="#" class="text-slate-500 hover:text-emerald-400"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
